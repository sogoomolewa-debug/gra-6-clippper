name: Fetch Short Performance Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch stats
        env:
          YOUTUBE_OAUTH_JSON: ${{ secrets.YOUTUBE_OAUTH_JSON }}
        run: python fetch_stats.py

      - name: Commit updated logs
        run: |
          git config user.name "pipeline-bot"
          git config user.email "bot@pipeline"
          git add data/performance_log.json data/channel_analytics.json
          git diff --staged --quiet || git commit -m "stats: update $(date +%Y-%m-%d %H:%M)"
          git push

